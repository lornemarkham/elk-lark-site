  <text x="120" y="92" text-anchor="middle" fill="#f5f0e8" font-family="Bebas Neue, Impact, sans-serif" font-size="14" letter-spacing="0.2em">SOUTHERN OUTLAW</text>
  <!-- Main patch text -->
  <text x="120" y="148" text-anchor="middle" fill="#f5f0e8" font-family="Bebas Neue, Impact, sans-serif" font-size="36" letter-spacing="0.12em">PIGNITION</text>
  <text x="120" y="172" text-anchor="middle" fill="#a0a0a0" font-family="Inter, system-ui, sans-serif" font-size="10" letter-spacing="0.3em">BBQ</text>
